<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clips & Shorts — BRDO</title>
  <meta name="description" content="Every BRDO short and clip. Barely Researched, Deeply Opinionated.">
  <meta property="og:title" content="Clips & Shorts — BRDO">
  <meta property="og:image" content="./BRDO Thumbnail.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:      #F5C216;
      --orange:      #F07B1A;
      --dark:        #1A1209;
      --cream:       #FFF8E1;
      --font-display: 'Bangers', cursive;
      --font-body:    'Lora', serif;
      --font-ui:      'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--cream);
      overflow-x: hidden;
    }

    /* ─── NAV ─────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26, 18, 9, 0.97);
      backdrop-filter: blur(12px);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(245,194,22,0.15);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 2.2rem;
      letter-spacing: 0.05em;
      color: var(--yellow);
      text-decoration: none;
      line-height: 1;
    }

    .nav-back {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,248,225,0.7);
      text-decoration: none;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-back:hover { color: var(--yellow); }

    /* ─── HEADER ──────────────────────────────────────── */
    .page-header {
      background: repeating-conic-gradient(var(--yellow) 0deg 10deg, var(--orange) 10deg 20deg);
      padding: 5rem 2rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      inset: -100%;
      width: 300%;
      height: 300%;
      background: repeating-conic-gradient(rgba(255,255,255,0.06) 0deg 10deg, transparent 10deg 20deg);
      animation: spin 90s linear infinite;
      pointer-events: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .page-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(26,18,9,0.2) 100%);
      pointer-events: none;
    }

    .page-header-inner {
      position: relative;
      z-index: 2;
      max-width: 700px;
      margin: 0 auto;
    }

    .page-label {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(26,18,9,0.6);
      margin-bottom: 0.75rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 0.9;
      letter-spacing: 0.06em;
      font-weight: 400;
      color: var(--dark);
    }

    .page-sub {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(26,18,9,0.65);
      margin-top: 1rem;
    }

    /* ─── CLIPS GRID ──────────────────────────────────── */
    .clips-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 5rem 2rem 6rem;
    }

    .clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .clip-card {
      background: #231810;
      border: 2px solid rgba(245,194,22,0.15);
      overflow: hidden;
      transition: border-color 0.25s, transform 0.25s;
    }

    .clip-card:hover {
      border-color: rgba(245,194,22,0.45);
      transform: translateY(-4px);
    }

    .clip-thumb {
      position: relative;
      padding-top: 177.78%; /* 9:16 */
    }

    .clip-thumb iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ─── FOOTER ──────────────────────────────────────── */
    .page-footer {
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(245,194,22,0.1);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .page-footer p {
      font-family: var(--font-ui);
      font-size: 0.82rem;
      color: rgba(255,248,225,0.3);
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      border: 3px solid var(--yellow);
      background: transparent;
      color: var(--yellow);
      transition: background 0.18s, color 0.18s, transform 0.18s, box-shadow 0.18s;
    }

    .btn:hover {
      background: var(--yellow);
      color: var(--dark);
      transform: translate(-3px, -3px);
      box-shadow: 6px 6px 0 rgba(245,194,22,0.3);
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 500px) {
      .clips-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">BRDO</a>
    <a href="index.html" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Home
    </a>
  </nav>

  <header class="page-header">
    <div class="page-header-inner">
      <div class="page-label">Short &amp; Sharp</div>
      <h1 class="page-title">Clips &amp; Shorts</h1>
      <p class="page-sub" id="clips-sub">Loading clips…</p>
    </div>
  </header>

  <main class="clips-section">
    <div class="clips-grid" id="clips-grid"></div>
  </main>

  <footer class="page-footer">
    <p>&copy; 2025 BRDO — Barely Researched, Deeply Opinionated. All rights reserved.</p>
    <a href="index.html" class="btn">← Back to Home</a>
  </footer>

  <script>
    fetch('./data.json')
      .then(r => r.json())
      .then(data => {
        const clips = data.clips;
        const grid = document.getElementById('clips-grid');
        const sub = document.getElementById('clips-sub');

        sub.textContent = clips.length + ' clips. The best bits, no filler.';

        clips.forEach(id => {
          const card = document.createElement('div');
          card.className = 'clip-card';
          card.innerHTML =
            '<div class="clip-thumb">' +
              '<iframe src="https://www.youtube.com/embed/' + id + '"' +
              ' allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"' +
              ' loading="lazy" title="BRDO Short"></iframe>' +
            '</div>';
          grid.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('clips-sub').textContent = 'Could not load clips.';
      });
  </script>

</body>
</html>
